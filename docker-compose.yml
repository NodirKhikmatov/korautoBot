# Production stack — env vars live on VPS in .env.production (never committed).
# Deployed only via GitHub Actions (deploy/ci/deploy.sh).

name: korea-auto-market

services:
  app-blue:
    image: ${IMAGE_REGISTRY}:${BLUE_IMAGE_TAG:-latest}
    container_name: kam-app-blue
    env_file:
      - path: .env.production
        required: true
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - kam
    restart: unless-stopped

  app-green:
    image: ${IMAGE_REGISTRY}:${GREEN_IMAGE_TAG:-latest}
    container_name: kam-app-green
    env_file:
      - path: .env.production
        required: true
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - kam
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: kam-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/docker/default.conf.active:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/upstream/active.conf:/etc/nginx/conf.d/upstream-active.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      app-blue:
        condition: service_started
      app-green:
        condition: service_started
    networks:
      - kam
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: kam-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $!; done;"
    restart: unless-stopped

volumes:
  certbot-www:
  certbot-conf:

networks:
  kam:
    driver: bridge
