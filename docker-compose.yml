# Production stack — Vultr VPS
# Env: .env.production on server (never committed)
# Deploy: GitHub Actions only (see .github/workflows/deploy.yml)

name: korea-auto-market

x-app-common: &app-common
  env_file:
    - path: .env.production
      required: true
  expose:
    - "3000"
  networks:
    - kam
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "wget -q --spider http://127.0.0.1:3000/api/health || exit 1",
      ]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 45s
  deploy:
    resources:
      limits:
        memory: 512M

services:
  app-blue:
    <<: *app-common
    profiles: ["app"]
    image: ${IMAGE_REGISTRY}:${BLUE_IMAGE_TAG:-latest}
    container_name: kam-app-blue
    restart: unless-stopped

  app-green:
    <<: *app-common
    profiles: ["app"]
    image: ${IMAGE_REGISTRY}:${GREEN_IMAGE_TAG:-latest}
    container_name: kam-app-green
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: kam-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/docker/default.conf.active:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/upstream/active.conf:/etc/nginx/conf.d/upstream-active.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    networks:
      - kam
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: kam-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $!; done;"
    restart: unless-stopped

volumes:
  certbot-www:
  certbot-conf:

networks:
  kam:
    driver: bridge
