name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback:
        description: Rollback to previous deployment
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    if: github.event_name == 'push' || github.event.inputs.rollback != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrator
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-migrate
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-migrate
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: >
      always() &&
      (needs.build.result == 'success' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.rollback == 'true'))
    environment: production
    steps:
      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Deploy to Vultr VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
          IMAGE_REGISTRY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          ROLLBACK: ${{ github.event.inputs.rollback == 'true' && 'true' || 'false' }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG,IMAGE_REGISTRY,ROLLBACK,DEPLOY_PATH,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/var/www/korea-auto-market}"
            git fetch origin main
            git reset --hard origin/main
            export IMAGE_TAG="${IMAGE_TAG}"
            export IMAGE_REGISTRY="${IMAGE_REGISTRY}"
            export ROLLBACK="${ROLLBACK}"
            bash deploy/ci/deploy.sh
