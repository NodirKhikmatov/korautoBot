# Production deployment pipeline
#
# Push to main:
#   GitHub Push → Build Docker image → Push to GHCR
#   → SSH to Vultr VPS → git pull → pull image → recreate container
#   → health check → zero-downtime switch → restart (blue-green)
#
# Rollback: Actions → Deploy → Run workflow → enable rollback

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback:
        description: Rollback to previous deployment
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-docker-image:
    name: Build Docker image
    if: github.event_name == 'push' || github.event.inputs.rollback != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push application image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrator
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-migrate
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-migrate
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-vultr:
    name: Deploy to Vultr VPS
    runs-on: ubuntu-latest
    needs: [build-docker-image]
    if: >
      always() &&
      (needs.build-docker-image.result == 'success' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.rollback == 'true'))
    environment: production
    steps:
      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: SSH deploy — pull code, rebuild container, restart
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
          IMAGE_REGISTRY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          ROLLBACK: ${{ github.event.inputs.rollback == 'true' && 'true' || 'false' }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          envs: IMAGE_TAG,IMAGE_REGISTRY,ROLLBACK,DEPLOY_PATH,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/var/www/korea-auto-market}"
            echo "==> Pulling latest code from main"
            git fetch origin main
            git reset --hard origin/main
            export IMAGE_TAG="${IMAGE_TAG}"
            export IMAGE_REGISTRY="${IMAGE_REGISTRY}"
            export ROLLBACK="${ROLLBACK}"
            bash deploy/ci/deploy.sh

      - name: Verify health endpoint
        if: github.event.inputs.rollback != 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_URL,DEPLOY_PATH
          script: |
            if [ -n "${APP_URL:-}" ]; then
              curl -fsS "${APP_URL}/api/health" || echo "WARN: external health check failed"
            else
              docker exec kam-nginx wget -qO- http://kam_app/api/health || true
            fi
