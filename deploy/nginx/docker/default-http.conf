# Temporary HTTP-only config for initial Let's Encrypt bootstrap.
# No app upstream — app-blue may not exist yet (avoids nginx crash on unresolved host).

server {
  listen 80;
  listen [::]:80;
  server_name YOUR_DOMAIN;

  client_max_body_size 32m;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    allow all;
  }

  location / {
    return 200 "bootstrap\n";
    add_header Content-Type text/plain;
  }
}
