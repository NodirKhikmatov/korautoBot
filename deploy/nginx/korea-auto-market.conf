# Nginx reverse proxy for Korea Auto Market (Next.js + PM2)
#
# Install:
#   sudo cp deploy/nginx/korea-auto-market.conf /etc/nginx/sites-available/korea-auto-market
#   sudo ln -sf /etc/nginx/sites-available/korea-auto-market /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your domain (e.g. app.example.com)

upstream korea_auto_market {
  server 127.0.0.1:3000;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name YOUR_DOMAIN;

  # Certbot will add SSL — or uncomment after obtaining certificates:
  # return 301 https://$host$request_uri;

  client_max_body_size 32m;

  location / {
    proxy_pass http://korea_auto_market;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}

